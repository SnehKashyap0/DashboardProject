<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="profile.css" />
    <link rel="stylesheet" href="../Dashboard Home/dashboard-home.css" />
    <title>Profile</title>
  </head>
  <body>
    <div class="overlay"></div>
    <nav class="navbar">
      <div class="heading">
        <div class="menu"><i class="fa-solid fa-bars"></i></div>

        <div class="sidebar">
          <ul>
            <li class="home-link"><i class="fa-solid fa-house"></i> Home</li>
            <li class="analytics-link">
              <i class="fa-solid fa-chart-bar"></i> Analytics
            </li>
            <li class="users-link"><i class="fa-solid fa-users"></i> Users</li>
            <li class="reports-link">
              <i class="fa-solid fa-file-lines"></i> Reports
            </li>
            <li class="divider-item"></li>
            <li class="profile-link active">
              <i class="fa-solid fa-user"></i> Profile
            </li>
            <li class="settings-link">
              <i class="fa-solid fa-gear"></i> Settings
            </li>
            <li class="help-link">
              <i class="fa-solid fa-circle-question"></i> Help
            </li>
          </ul>
        </div>

        <h3>Profile Page</h3>
      </div>
      <div class="profile">
        <div class="profile-pic">
          <img
            src="/assets/images/Blank Profile Picture.png"
            alt="Profile Picture"
          />
        </div>
        <div class="dropdown-menu">
          <div class="Profile-name"></div>
          <i class="fa-solid fa-angle-down"></i>
          <div class="dropdown-content">
            <p class="popup-option" id="popupUsername"></p>
            <div class="popup-option">My Profile</div>
            <div class="popup-option">Settings</div>
            <div class="popup-option" id="popup-logout">Logout</div>
          </div>
        </div>
      </div>
    </nav>
    <main>
      <div class="profile-card">
        <div class="avatar" id="avatarimg">
          <img src="/assets/images/Blank Profile Picture.png" alt="pp" />
        </div>
        <div class="user-name" id="displayName"></div>
        <div class="user-handle" id="displayHandle"></div>

        <div class="divider"></div>

        <div class="field">
          <div class="field-label">Full Name</div>
          <div class="field-value" id="fieldName"></div>
        </div>

        <div class="field">
          <div class="field-label">Username</div>
          <div class="field-value" id="fieldUsername"></div>
        </div>

        <div class="field">
          <div class="field-label">Email Address</div>
          <div class="field-value" id="fieldEmail"></div>
        </div>

        <button class="edit-btn">Edit Profile</button>
        <div class="delete-btn">Delete Profile</div>
      </div>
    </main>
    <footer class="footer">
      <div class="footer-links">
        <div class="footer-item footer-home">
          <i class="fa-solid fa-house"></i>
          <span>Home</span>
        </div>
        <div class="footer-item footer-analytics">
          <i class="fa-solid fa-chart-bar"></i>
          <span>Analytics</span>
        </div>
        <div class="footer-item footer-users">
          <i class="fa-solid fa-users"></i>
          <span>Users</span>
        </div>
        <div class="footer-item active footer-profile">
          <i class="fa-solid fa-user"></i>
          <span>Profile</span>
        </div>
        <div class="footer-item footer-settings">
          <i class="fa-solid fa-gear"></i>
          <span>Settings</span>
        </div>
      </div>
    </footer>
  </body>
  <script src="profile.js"></script>
</html>
