<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="signup.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <section class="formSection">
        <div class="heading">Sign Up</div>

        <div class="loginForm">
          <form action="/submit" novalidate>
            <div class="usernameField">
              <label for="fullname">Full Name</label>
              <input type="text" id="fullname" required />
              <div class="errname"></div>
            </div>

            <div class="emailField">
              <label for="email">Email</label>
              <input type="email" id="email" required />
              <div class="erremail"></div>
            </div>

            <div class="usernameField">
              <label for="username">Username</label>
              <input type="text" id="username" required />
              <div class="errusername"></div>
            </div>

            <div class="passwordField">
              <label for="password">Password</label>
              <input type="password" id="password" required /><i
                class="fa-solid fa-eye"
                id="eyeIcon1"
              ></i>
              <div class="errpassword"></div>
            </div>

            <div class="passwordField">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" required /><i
                class="fa-solid fa-eye"
                id="eyeIcon2"
              ></i>
              <div class="errconfirmpassword"></div>
            </div>

            <div class="signUpBtn">
              <button id="btn" type="submit">Create Account</button>
            </div>

            <div class="signInTxt">
              <p>
                Already have an account?
                <a href="/Pages/Login/login.html">Login</a>
              </p>
            </div>
          </form>
        </div>
      </section>

      <section class="imgSection">
        <img src="/assets/images/Message Background.webp" alt="img" />

        <div class="createAccount">
          <h3>
            <span>Create Account</span>
          </h3>
        </div>
      </section>
    </div>
  </body>
  <script src="signup.js"></script>
</html>
